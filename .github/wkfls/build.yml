name: Build 云通VPN APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4.0.1
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '13114758'
        packages: 'platforms;android-34 build-tools;34.0.0 platform-tools ndk;25.2.9519653'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Download libxray
      run: |
        mkdir -p app/libs
        LATEST=$(curl -s https://api.github.com/repos/XTLS/libxray/releases/latest | jq -r '.tag_name')
        echo "Latest libxray: $LATEST"
        wget -q "https://github.com/XTLS/libxray/releases/download/${LATEST}/libxray.aar" -O app/libs/libxray.aar || \
        echo "WARNING: libxray.aar download failed"

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 云通VPN-APK
        path: app/build/outputs/apk/debug/*.apk
