name: Build 云通VPN APK
on:
  workflow_dispatch:
  push:
    branches: [main, master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '17' }
    - uses: android-actions/setup-android@v4.0.1
      with: { log-accepted-android-sdk-licenses: false, cmdline-tools-version: '13114758', packages: 'platforms;android-34 build-tools;34.0.0 platform-tools ndk;25.2.9519653' }
    - uses: gradle/actions/setup-gradle@v3
    - run: gradle wrapper --gradle-version 8.5
    - name: Download libxray
      run: |
        mkdir -p app/libs
        LATEST=$(curl -s https://api.github.com/repos/XTLS/libxray/releases/latest | jq -r '.tag_name')
        wget -q "https://github.com/XTLS/libxray/releases/download/${LATEST}/libxray.aar" -O app/libs/libxray.aar
    - run: ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with: { name: 云通VPN-APK, path: app/build/outputs/apk/debug/*.apk }